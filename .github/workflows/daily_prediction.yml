name: Daily Lottery Prediction

on:
  schedule:
    # 每周二、四、日 23:59 UTC (北京时间周一、三、四 07:59) - 双色球
    - cron: '59 23 * * 2,4,0'
    # 每周一、三、六 23:59 UTC (北京时间周二、四、五 07:59) - 大乐透
    - cron: '59 23 * * 1,3,6'
  workflow_dispatch:  # 允许手动触发

jobs:
  predict-lottery:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas lxml loguru tensorflow==2.6.1 tensorflow-addons==0.10.0 keras==2.6.0 grpcio==1.46.0 protobuf==3.18.1

    - name: Create necessary directories
      run: |
        mkdir -p data/ssq data/dlt model/ssq/red_ball_model model/ssq/blue_ball_model model/dlt/red_ball_model model/dlt/blue_ball_model

    - name: Run get_data.py for SSQ (双色球)
      run: |
        python get_data.py --name ssq

    - name: Run get_data.py for DLT (大乐透)
      run: |
        python get_data.py --name dlt

    - name: Run run_train_model.py for SSQ (双色球)
      run: |
        python run_train_model.py --name ssq --train_test_split 0.8

    - name: Run run_train_model.py for DLT (大乐透)
      run: |
        python run_train_model.py --name dlt --train_test_split 0.8

    - name: Run run_predict.py for SSQ (双色球)
      run: |
        python run_predict.py --name ssq >> prediction_results.txt 2>&1 || true

    - name: Run run_predict.py for DLT (大乐透)
      run: |
        python run_predict.py --name dlt >> prediction_results.txt 2>&1 || true

    - name: Update README with prediction results
      run: |
        echo "=== Lottery Prediction Summary ===" > README_update.md
        echo "Date: $(TZ='Asia/Shanghai' date)" >> README_update.md
        echo "" >> README_update.md

        # 检查是否有预测结果
        if grep -q "预测期号" prediction_results.txt; then
          echo "SSQ (双色球) Prediction Results:" >> README_update.md
          echo "================================" >> README_update.md
          tail -10 prediction_results.txt | grep -E "(预测期号|预测结果)" >> README_update.md
          echo "" >> README_update.md

          echo "DLT (大乐透) Prediction Results:" >> README_update.md
          echo "===============================" >> README_update.md
          tail -5 prediction_results.txt | grep -E "(预测期号|预测结果)" >> README_update.md
          echo "" >> README_update.md
        else
          echo "No lottery predictions were generated today." >> README_update.md
          echo "This may be because today is not a prediction day." >> README_update.md
        fi

        # 将更新后的内容追加到README.md的尾部
        cat README.md > README_temp.md
        cat README_update.md >> README_temp.md
        cp README_temp.md README.md
        rm README_temp.md README_update.md

        echo "README.md has been updated with today's prediction results!"

        # 提交并推送 README.md 的更新到仓库
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add README.md
        git diff --staged --quiet || git commit -m "Update README with lottery prediction results [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')]"
        git push

    - name: Upload prediction results as Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lottery-predictions
        path: prediction_results.txt
